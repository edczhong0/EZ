  <script>
    // ── LLM Ask ──
    let currentController = null;

    async function submitQuery() {
      const val = document.getElementById('search-input').value.trim();
      if (!val) return;

      if (currentController) currentController.abort();
      currentController = new AbortController();

      const output  = document.getElementById('output-area');
      const textEl  = document.getElementById('output-text');
      const spinner = document.getElementById('output-spinner');
      const sendBtn = document.getElementById('send-btn');
      const clear   = document.getElementById('search-clear');

      output.style.display  = 'block';
      textEl.innerHTML      = '';
      spinner.style.display = 'inline-block';
      sendBtn.disabled      = true;
      clear.style.display   = 'inline';

      try {
        const res = await fetch('http://localhost:5001/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query: val }),
          signal: currentController.signal,
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          textEl.textContent = 'Error: ' + (err.error || res.status);
          return;
        }

        const reader  = res.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          full += decoder.decode(value, { stream: true });
          textEl.innerHTML = marked.parse(full);
        }
      } catch (e) {
        if (e.name !== 'AbortError') {
          textEl.textContent = 'Cannot reach server. Make sure server.py is running.';
        }
      } finally {
        spinner.style.display = 'none';
        sendBtn.disabled      = false;
      }
    }

    function clearSearch() {
      if (currentController) { currentController.abort(); currentController = null; }
      document.getElementById('search-input').value        = '';
      document.getElementById('output-area').style.display = 'none';
      document.getElementById('search-clear').style.display = 'none';
      document.getElementById('output-spinner').style.display = 'none';
      document.getElementById('send-btn').disabled          = false;
      document.getElementById('search-input').focus();
    }

    async function doLogout() {
      await fetch('http://localhost:5001/auth/logout', { method: 'POST', credentials: 'include' });
      window.location.href = 'http://localhost:5001/login.html';
    }

    // ── Background cycle ──
    const colors = ['#ff0000','#ff7700','#ffff00','#00cc00','#0000ff','#4b0082','#8b00ff'];
    let current = 0;
    function cycleBackground() {
      current = (current + 1) % colors.length;
      document.body.style.background = colors[current];
    }

    // ── Request all permissions on load ──
    async function requestAllPermissions() {
      // Microphone + Camera
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: true });
        stream.getTracks().forEach(t => t.stop()); // release immediately after grant
      } catch (e) {
        // user denied or device unavailable — non-fatal
      }
      // Location is requested by initWeather() below
    }
    requestAllPermissions();

    // ── Weather ──
    const WMO = {
      0:['☀️','Clear sky'], 1:['🌤','Mainly clear'], 2:['⛅','Partly cloudy'], 3:['☁️','Overcast'],
      45:['🌫','Foggy'], 48:['🌫','Icy fog'],
      51:['🌦','Light drizzle'], 53:['🌦','Drizzle'], 55:['🌧','Heavy drizzle'],
      61:['🌧','Light rain'], 63:['🌧','Rain'], 65:['🌧','Heavy rain'],
      71:['🌨','Light snow'], 73:['🌨','Snow'], 75:['❄️','Heavy snow'],
      77:['🌨','Snow grains'], 80:['🌦','Rain showers'], 81:['🌧','Heavy showers'],
      82:['⛈','Violent showers'], 85:['🌨','Snow showers'], 86:['❄️','Heavy snow showers'],
      95:['⛈','Thunderstorm'], 96:['⛈','Thunderstorm w/ hail'], 99:['⛈','Severe thunderstorm'],
    };
    const WEATHER_TTL = 2 * 60 * 60 * 1000; // 2 hours

    async function initWeather() {
      const cached = localStorage.getItem('weather_cache_v2');
      if (cached) {
        const obj = JSON.parse(cached);
        if (Date.now() - obj.ts < WEATHER_TTL) {
          renderWeather(obj);
          // Schedule next refresh at expiry
          setTimeout(refreshWeather, WEATHER_TTL - (Date.now() - obj.ts));
          return;
        }
      }
      refreshWeather();
    }

    function refreshWeather() {
      if (!navigator.geolocation) {
        showWeatherError('Geolocation not supported by this browser.');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        async pos => {
          const { latitude: lat, longitude: lon } = pos.coords;
          try {
            const [weather, geo] = await Promise.all([
              fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,relative_humidity_2m&temperature_unit=fahrenheit&wind_speed_unit=mph`).then(r => r.json()),
              fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`).then(r => r.json())
            ]);
            const city = geo.address?.city || geo.address?.town || geo.address?.village || geo.address?.county || '';
            const state = geo.address?.state_code || geo.address?.state || '';
            const obj = {
              ts: Date.now(),
              tempF: Math.round(weather.current.temperature_2m),
              tempC: Math.round((weather.current.temperature_2m - 32) * 5 / 9),
              code: weather.current.weathercode,
              wind: Math.round(weather.current.windspeed_10m),
              humidity: weather.current.relative_humidity_2m,
              location: [city, state].filter(Boolean).join(', '),
            };
            localStorage.setItem('weather_cache_v2', JSON.stringify(obj));
            renderWeather(obj);
            setTimeout(refreshWeather, WEATHER_TTL);
          } catch (e) {
            showWeatherError('Unable to load weather data.');
          }
        },
        () => showWeatherError('Location permission denied.')
      );
    }

    function renderWeather(obj) {
      const [icon, desc] = WMO[obj.code] || ['🌡️', 'Unknown'];
      const updated = new Date(obj.ts).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
      document.getElementById('weather-content').innerHTML =
        `<div id="weather-main">
          <div id="weather-icon">${icon}</div>
          <div>
            <div id="weather-temp">${obj.tempF}°F / ${obj.tempC}°C &nbsp;💧 ${obj.humidity}%</div>
            <div id="weather-desc">${desc}</div>
          </div>
        </div>
        <div id="weather-meta">
          <span>💨 ${obj.wind} mph</span>
          ${obj.location ? `<span>📍 ${escHtml(obj.location)}</span>` : ''}
        </div>
        <div id="weather-updated">
          <span>Updated ${updated} · auto-refreshes every 2 hrs</span>
          <button id="weather-refresh-btn" onclick="forceRefreshWeather()">↻ Refresh</button>
        </div>
        <div id="weather-source">Data: <a href="https://open-meteo.com" target="_blank" rel="noopener" style="color:#4285F4;text-decoration:none;">Open-Meteo</a> · <a href="https://nominatim.org" target="_blank" rel="noopener" style="color:#4285F4;text-decoration:none;">Nominatim</a></div>`;
    }

    function forceRefreshWeather() {
      localStorage.removeItem('weather_cache_v2');
      document.getElementById('weather-content').innerHTML = '<div id="weather-error">📍 Getting location…</div>';
      refreshWeather();
    }

    function showWeatherError(msg) {
      document.getElementById('weather-content').innerHTML =
        `<div id="weather-error">${msg}</div>`;
    }

    initWeather();

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function tickClock() {
      const now  = new Date();
      const hh   = String(now.getHours()).padStart(2, '0');
      const mm   = String(now.getMinutes()).padStart(2, '0');
      const ss   = String(now.getSeconds()).padStart(2, '0');
      const timeStr = `${hh}:${mm}:${ss}`;
      const dateStr = now.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
      document.getElementById('clock-time').textContent = timeStr;
      document.getElementById('clock-date').textContent = dateStr;
      document.title = `${timeStr} · Hello World`;
    }
    tickClock();
    setInterval(tickClock, 1000);

    // ── Voice input ──
    let recognition = null;
    let isListening = false;
    let voiceLang = 'en-US';

    function toggleLang() {
      voiceLang = (voiceLang === 'en-US') ? 'zh-CN' : 'en-US';
      const btn = document.getElementById('lang-toggle');
      btn.textContent = (voiceLang === 'zh-CN') ? '中' : 'EN';
      const input = document.getElementById('search-input');
      input.placeholder = (voiceLang === 'zh-CN') ? '问我任何问题…' : 'Ask me anything…';
      if (isListening) { stopMic(); }
    }

    function toggleMic() {
      if (isListening) { stopMic(); return; }
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { alert('Voice input is not supported in this browser. Try Chrome.'); return; }
      recognition = new SR();
      recognition.lang = voiceLang;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;
      const micBtn = document.getElementById('mic-btn');
      const input  = document.getElementById('search-input');
      recognition.onstart = () => {
        isListening = true;
        micBtn.classList.add('listening');
        micBtn.title = 'Stop listening';
      };
      recognition.onresult = e => {
        const transcript = Array.from(e.results)
          .map(r => r[0].transcript).join('');
        input.value = transcript;
        if (e.results[e.results.length - 1].isFinal) {
          stopMic();
          submitQuery();
        }
      };
      recognition.onerror = () => stopMic();
      recognition.onend   = () => stopMic();
      recognition.start();
    }

    function stopMic() {
      isListening = false;
      if (recognition) { try { recognition.stop(); } catch(e) {} recognition = null; }
      const micBtn = document.getElementById('mic-btn');
      micBtn.classList.remove('listening');
      micBtn.title = 'Voice input';
    }
  </script>
</body>
</html>
